<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Paperplane Dashboard</title>
  <link rel="stylesheet" href="/style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
</head>
<body>
  <nav class="dash-nav">
    <div class="nav-links">
      <a href="/" class="nav-brand">Paperplane</a>
      <a href="/commands">Commands</a>
    </div>
    <div id="nav-user"></div>
  </nav>

  <main>
    <div id="login-screen" class="screen hidden">
      <div class="card">
        <h1>Paperplane Dashboard</h1>
        <p>Login with your Discord account to manage the music bot.</p>
        <a href="/auth/login" class="btn btn-discord">Login with Discord</a>
      </div>
    </div>

    <div id="dashboard-screen" class="screen hidden">
      <aside id="guild-list">
        <h3>Servers</h3>
        <div id="guilds"></div>
      </aside>

      <section id="player-panel">
        <div id="no-guild-selected" class="placeholder">
          <p>Select a server to manage music playback.</p>
        </div>

        <div id="tabs" class="hidden">
          <button class="tab-btn active" data-tab="player">Player</button>
          <button class="tab-btn" data-tab="stats">Statistics</button>
        </div>

        <div id="player-content" class="hidden">
          <div id="now-playing">
            <div id="np-thumbnail"></div>
            <div id="np-info">
              <div id="np-title"></div>
              <div id="np-author"></div>
              <div id="np-progress">
                <div id="np-progress-bar"><div id="np-progress-fill"></div></div>
                <span id="np-time"></span>
              </div>
            </div>
          </div>

          <div id="controls">
            <button id="btn-play-pause" class="ctrl-btn" title="Play/Pause">⏸</button>
            <button id="btn-skip" class="ctrl-btn" title="Skip">⏭</button>
            <button id="btn-stop" class="ctrl-btn" title="Stop">⏹</button>
            <div id="volume-group">
              <label>Vol</label>
              <input type="range" id="volume-slider" min="1" max="100" value="80">
              <input type="number" id="volume-input" min="1" max="100" value="80">
            </div>
          </div>

          <div id="settings-section">
            <h3>Settings</h3>
            <div class="setting-row">
              <label for="prefix-input">Prefix</label>
              <div class="setting-control">
                <input type="text" id="prefix-input" maxlength="3" class="input-sm">
                <button id="btn-save-prefix" class="btn btn-sm">Save</button>
              </div>
            </div>
          </div>

          <div id="queue-section">
            <h3>Queue</h3>
            <div id="queue-list"></div>
            <div id="queue-pagination" class="hidden">
              <button id="btn-queue-prev" class="page-btn">‹ Prev</button>
              <span id="queue-page-info"></span>
              <button id="btn-queue-next" class="page-btn">Next ›</button>
            </div>
          </div>
        </div>

          <div id="stats-content" class="hidden">
          <div id="stats-header">
            <h2>Statistics</h2>
            <select id="stats-days">
              <option value="7">Last 7 days</option>
              <option value="30">Last 30 days</option>
              <option value="90">Last 90 days</option>
            </select>
          </div>

          <div class="stats-grid">
            <div class="stats-card">
              <span class="stat-label">Track types</span>
              <div class="stats-split">
                <div class="chart-area"><canvas id="chart-sources"></canvas></div>
                <div class="list-area" id="stats-sources-list"></div>
              </div>
            </div>

            <div class="stats-card">
              <h3>Most time played</h3>
              <div class="stats-split">
                <div class="chart-area"><canvas id="chart-tracks"></canvas></div>
                <div class="list-area" id="stats-tracks-list"></div>
              </div>
            </div>

            <div class="stats-card">
              <h3>Most time listened</h3>
              <div class="stats-split">
                <div class="chart-area"><canvas id="chart-users"></canvas></div>
                <div class="list-area" id="stats-users-list"></div>
              </div>
            </div>

            <div class="stats-card">
              <h3>Top commands</h3>
              <div class="stats-split">
                <div class="chart-area"><canvas id="chart-commands"></canvas></div>
                <div class="list-area" id="stats-commands-list"></div>
              </div>
            </div>
          </div>
        </div>
      </section>
    </div>
  </main>

  <div id="toast" class="hidden"></div>
  <script src="/app.js"></script>
</body>
</html>
